<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
</head>

<body style="font-family:Arial; text-align:center; padding:50px;">

  <h2>Ingreso Administrador</h2>

  <input id="email" placeholder="Correo"><br><br>
  <input id="password" type="password" placeholder="Contraseña"><br><br>

  <button onclick="login()">Ingresar</button>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

  <script>

    const firebaseConfig = {
    apiKey: "AIzaSyAxcjIRGV1eg59e8fJXZZaZzLcdXfa3lQI",
      authDomain: "fundacion-isla-cascajal.firebaseapp.com",
      projectId: "fundacion-isla-cascajal",
    };

    firebase.initializeApp(firebaseConfig);

    function login() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      firebase.auth().signInWithEmailAndPassword(email, password)
        .then(() => {
          window.location.href = "dashboard.html";
        })
        .catch(() => {
          alert("❌ Credenciales incorrectas");
        });
    }

  </script>

</body>
</html>
