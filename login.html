    <!DOCTYPE html>
    <html>
    <head>
    <title>Login</title>

    <style>
        body {
        margin: 0;
        font-family: 'Segoe UI', Arial;
        background: linear-gradient(135deg, #1e3a5f, #0f172a);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        }

        .card {
        background: white;
        padding: 40px 30px;
        border-radius: 16px;
        width: 320px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
        }

        h2 {
        margin-bottom: 20px;
        color: #1e3a5f;
        }

        input {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border-radius: 8px;
        border: 1px solid #ccc;
        transition: 0.2s;
        }

        input:focus {
        border-color: #1e3a5f;
        outline: none;
        box-shadow: 0 0 5px rgba(30,58,95,0.3);
        }

        button {
        width: 100%;
        padding: 12px;
        margin-top: 15px;
        border: none;
        border-radius: 8px;
        background: #1e3a5f;
        color: white;
        font-size: 15px;
        cursor: pointer;
        transition: 0.3s;
        }

        button:hover {
        background: #162c47;
        }

        .error {
        color: #dc2626;
        margin-top: 10px;
        font-size: 14px;
        }

    </style>
    </head>

    <body>

    <div class="card">

        <h2>Ingreso Administrador</h2>

        <input id="email" placeholder="Correo">
        <input id="password" type="password" placeholder="Contraseña">

        <button onclick="login()">Ingresar</button>

        <div id="error" class="error"></div>

    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <script>

const firebaseConfig = {
  apiKey: "AIzaSyAxcjIRGV1eg59e8fJXZZaZzLcdXfa3lQI",
  authDomain: "fundacion-isla-cascajal.firebaseapp.com",
  projectId: "fundacion-isla-cascajal",
};

firebase.initializeApp(firebaseConfig);

// 🔥 CONTROL GLOBAL DE SESIÓN
firebase.auth().onAuthStateChanged(user => {
  if (user) {
    // Si ya está logueado, lo manda directo al dashboard
    window.location.href = "dashboard.html";
  }
});

function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  firebase.auth().signInWithEmailAndPassword(email, password)
    .then(() => {

      // 🔥 ESPERA CONFIRMACIÓN REAL
      firebase.auth().onAuthStateChanged(user => {
        if (user) {
          window.location.href = "dashboard.html";
        }
      });

    })
    .catch(() => {
      document.getElementById("error").innerText = "❌ Credenciales incorrectas";
    });
}

</script>

    </body>
    </html>
