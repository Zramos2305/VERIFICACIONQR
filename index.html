<!DOCTYPE html>
<html>
<head>
  <title>Verificación de Documento</title>
</head>

<body style="margin:0; font-family: 'Segoe UI', Arial; background:#eef2f7;">

  <div style="max-width:500px; margin:60px auto; background:white; border-radius:12px; box-shadow:0 6px 20px rgba(0,0,0,0.1); overflow:hidden;">
    
    <!-- HEADER -->
    <div style="background:#1e3a5f; color:white; padding:20px; text-align:center;">
      <img src="logo.png" width="100" style="margin-bottom:10px;">
      <h2 style="margin:0;">Verificación Oficial</h2>
      <p style="margin:5px 0 0; font-size:14px;">Sistema de autenticidad documental</p>
    </div>

    <!-- CONTENIDO -->
    <div style="padding:25px; text-align:center;">
      <div id="resultado">🔄 Verificando documento...</div>
    </div>

    <!-- FOOTER -->
    <div style="background:#f1f1f1; text-align:center; padding:10px; font-size:12px; color:#555;">
      Documento validado digitalmente
    </div>

  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <!-- generar  QR -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <script>

    const firebaseConfig = {
      apiKey: "AIzaSyAxcjIRGV1eg59e8fJXZZaZzLcdXfa3lQI",
      authDomain: "fundacion-isla-cascajal.firebaseapp.com",
      projectId: "fundacion-isla-cascajal",
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const params = new URLSearchParams(window.location.search);
    const codigo = params.get("doc")?.trim().toUpperCase();

    if (!codigo) {
      document.getElementById("resultado").innerHTML = `
        <div style="color:#dc2626; font-size:22px; margin-bottom:15px;">
          ❌ Código no proporcionado
        </div>
      `;
    } else {

      db.collection("documentos").doc(codigo).get()
      .then(doc => {

        if (doc.exists) {

          const data = doc.data();

          document.getElementById("resultado").innerHTML = `
            <div style="color:#16a34a; font-size:22px; margin-bottom:15px;">
              ✅ DOCUMENTO VÁLIDO
            </div>

            <h3 style="margin:10px 0;">${data.nombre}</h3>

            <p style="margin:5px;"><strong>Código:</strong> ${codigo}</p>
            <p style="margin:5px;"><strong>Tipo:</strong> ${data.tipo_documento}</p>
            <p style="margin:5px;"><strong>Estado:</strong> ${data.estado}</p>

            <div style="margin-top:20px; padding:10px; background:#ecfdf5; border-radius:8px; font-size:14px;">
              Este documento ha sido verificado correctamente en el sistema institucional.
            </div>
          `;

        } else {

          document.getElementById("resultado").innerHTML = `
            <div style="color:#dc2626; font-size:22px; margin-bottom:15px;">
              ❌ DOCUMENTO NO VÁLIDO
            </div>

            <p style="font-size:14px; color:#555;">
              El código ingresado no se encuentra registrado en el sistema.
            </p>
          `;
        }

      })
      .catch(error => {
        console.error(error);
      });

    }

  </script>

</body>
</html>
