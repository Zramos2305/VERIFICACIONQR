<!DOCTYPE html>
<html>
<head>
  <title>Verificación</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f1f5f9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      width: 400px;
      text-align: center;
    }

    .header {
      border-bottom: 2px solid #e5e7eb;
      margin-bottom: 20px;
      padding-bottom: 10px;
    }

    .valido {
      color: #16a34a;
      font-size: 22px;
      font-weight: bold;
    }

    .invalido {
      color: #dc2626;
      font-size: 22px;
      font-weight: bold;
    }

    .nombre {
      font-size: 20px;
      margin: 15px 0;
      font-weight: bold;
    }

    .info {
      margin: 5px 0;
      color: #374151;
    }

    .footer {
      margin-top: 20px;
      font-size: 13px;
      color: #6b7280;
      background: #f9fafb;
      padding: 10px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

  <div class="card">

    <div class="header">
      <h2>Verificación de Documento</h2>
    </div>

    <div id="resultado"></div>

  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <script>

    const firebaseConfig = {
      apiKey: "AIzaSyAxcjIRGV1eg59e8fJXZZaZzLcdXfa3lQI",
      authDomain: "fundacion-isla-cascajal.firebaseapp.com",
      projectId: "fundacion-isla-cascajal",
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const params = new URLSearchParams(window.location.search);
    const codigo = params.get("doc")?.trim().toUpperCase();

    if (!codigo) {
      document.getElementById("resultado").innerHTML = `
        <div class="invalido">❌ Código no proporcionado</div>
      `;
    } else {

      db.collection("documentos").doc(codigo).get().then(doc => {

        if (doc.exists) {

          const data = doc.data();

          document.getElementById("resultado").innerHTML = `
            <div class="valido">✅ DOCUMENTO VÁLIDO</div>

            <div class="nombre">${data.nombre}</div>

            <div class="info"><strong>Código:</strong> ${codigo}</div>
            <div class="info"><strong>Tipo:</strong> ${data.tipo_documento}</div>
            <div class="info"><strong>Estado:</strong> ${data.estado}</div>

            <div class="footer">
              Este documento ha sido verificado en el sistema institucional.
            </div>
          `;

        } else {

          document.getElementById("resultado").innerHTML = `
            <div class="invalido">❌ DOCUMENTO NO VÁLIDO</div>

            <div class="footer">
              El código no se encuentra registrado en el sistema.
            </div>
          `;
        }

      });

    }

  </script>

</body>
</html>
