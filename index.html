<!DOCTYPE html>
<html>
<head>
  <title>Verificación</title>
</head>

<body style="font-family: Arial; text-align:center; padding:40px;">

  <h2>Verificando documento...</h2>

  <div id="resultado"></div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAxcjIRGV1eg59e8fJXZZaZzLcdXfa3lQI",
      authDomain: "fundacion-isla-cascajal.firebaseapp.com",
      projectId: "fundacion-isla-cascajal",
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const params = new URLSearchParams(window.location.search);
    const codigo = params.get("doc")?.trim().toUpperCase();

    if (!codigo) {
      document.getElementById("resultado").innerHTML = "❌ Código no proporcionado";
    } else {

      db.collection("documentos").doc(codigo).get().then(doc => {

        if (doc.exists) {
          const data = doc.data();

          document.getElementById("resultado").innerHTML = `
            <div style="color:#16a34a; font-size:22px;">
              ✅ DOCUMENTO VÁLIDO
            </div>

            <h3>${data.nombre}</h3>
            <p><strong>Código:</strong> ${codigo}</p>
            <p><strong>Tipo:</strong> ${data.tipo_documento}</p>
            <p><strong>Estado:</strong> ${data.estado}</p>
          `;
        } else {
          document.getElementById("resultado").innerHTML = "❌ DOCUMENTO NO VÁLIDO";
        }

      });

    }
  </script>

</body>
</html>
