<!DOCTYPE html>
<html>
<head>
  <title>Verificación de Documento</title>
</head>

<body style="margin:0; font-family: 'Segoe UI', Arial; background:#eef2f7;">

  <div style="max-width:500px; margin:60px auto; background:white; border-radius:12px; box-shadow:0 6px 20px rgba(0,0,0,0.1); overflow:hidden;">
    
    <!-- HEADER -->
    <div style="background:#1e3a5f; color:white; padding:20px; text-align:center;">
  
  <img src="logo.png" width="90" style="margin-bottom:10px;">
  
  <h2 style="margin:0;">Verificación Oficial</h2>
  <p style="margin:5px 0 0; font-size:14px;">Sistema de autenticidad documental</p>

</div>

    <!-- CONTENIDO -->
    <div style="padding:25px; text-align:center;">
      <div id="resultado">🔄 Verificando documento...</div>
    </div>

    <!-- FOOTER -->
    <div style="background:#f1f1f1; text-align:center; padding:10px; font-size:12px; color:#555;">
      Documento validado digitalmente
    </div>

  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const codigo = params.get("doc");

    const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQY5wlLFCiUEzC9A8TWkY7lO8fRWRS0utqvJWQUMx9KuWC-0uGDWXV6PN9yTIyHrcHxlZ3uW5EACJTB/pub?output=csv";

    fetch(url)
      .then(response => response.text())
      .then(data => {
        const filas = data.split("\n");

        let encontrado = false;
        let nombre = "";
        let estado = "";

        filas.forEach(fila => {
          const columnas = fila.split(",");
          const id = columnas[0].trim();

          if (id === codigo.trim()) {
            encontrado = true;
            nombre = columnas[1];
            estado = columnas[2];
          }
        });

        if (encontrado) {
          document.getElementById("resultado").innerHTML = `
            <div style="color:#16a34a; font-size:22px; margin-bottom:15px;">
              ✅ DOCUMENTO VÁLIDO
            </div>

            <h3 style="margin:10px 0;">${nombre}</h3>

            <p style="margin:5px;"><strong>Código:</strong> ${codigo}</p>
            <p style="margin:5px;"><strong>Estado:</strong> ${estado}</p>

            <div style="margin-top:20px; padding:10px; background:#ecfdf5; border-radius:8px; font-size:14px;">
              Este documento ha sido verificado correctamente en el sistema institucional.
            </div>
          `;
        } else {
          document.getElementById("resultado").innerHTML = `
            <div style="color:#dc2626; font-size:22px; margin-bottom:15px;">
              ❌ DOCUMENTO NO VÁLIDO
            </div>

            <p style="font-size:14px; color:#555;">
              El código ingresado no se encuentra registrado en el sistema.
            </p>
          `;
        }
      });
  </script>

</body>
</html>
