<!DOCTYPE html>
<html>
<head>
  <title>Panel de Control</title>

  <style>
    body {
      font-family: Arial;
      background: #eef2f7;
      margin: 0;
    }

    .container {
      max-width: 1000px;
      margin: 40px auto;
      background: white;
      border-radius: 12px;
      padding: 25px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 15px;
      color: #1e3a5f;
    }

    /* 🔥 HEADER */
    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .crear {
      background: #1e3a5f;
      color: white;
      padding: 10px 18px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      transition: 0.3s;
    }

    .crear:hover {
      background: #162c47;
      transform: translateY(-1px);
    }

    .top-controls {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .buscar, select {
      flex: 1;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
      text-align: center;
    }

    th {
      background: #1e3a5f;
      color: white;
    }

    tr:hover {
      background: #f9fafb;
    }

    .tipo-certificado {
      color: #16a34a;
      font-weight: bold;
    }

    .tipo-afiliado {
      color: #2563eb;
      font-weight: bold;
    }

    .eliminar {
      background: #dc2626;
      color: white;
      border: none;
      border-radius: 5px;
      padding: 6px 10px;
      cursor: pointer;
    }

    .eliminar:hover {
      background: #b91c1c;
    }

  </style>
</head>

<body>

  <div class="container">

    <h2>Panel de Documentos</h2>

    <div class="header-top">
      <div></div>
      <button class="crear" onclick="irAGenerar()">
        ➕ Agregar documento
      </button>
    </div>

    <!-- 🔍 FILTROS -->
    <div class="top-controls">
      <input type="text" id="buscador" class="buscar" placeholder="Buscar por nombre o código...">

      <select id="filtroTipo">
        <option value="todos">Todos</option>
        <option value="certificado">Certificados</option>
        <option value="afiliado">Afiliados</option>
      </select>
    </div>

    <!-- 📊 TABLA -->
    <table>
      <thead>
        <tr>
          <th>Código</th>
          <th>Nombre</th>
          <th>Cédula</th>
          <th>Tipo</th>
          <th>Detalle</th>
          <th>Estado</th>
          <th>Acción</th>
        </tr>
      </thead>

      <tbody id="tabla"></tbody>
    </table>

  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <script>

    const firebaseConfig = {
      apiKey: "AIzaSyAxcjIRGV1eg59e8fJXZZaZzLcdXfa3lQI",
      authDomain: "fundacion-isla-cascajal.firebaseapp.com",
      projectId: "fundacion-isla-cascajal",
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let datos = [];

    function cargarDatos() {
      db.collection("documentos").get().then(snapshot => {

        datos = [];

        snapshot.forEach(doc => {
          datos.push({
            codigo: doc.id,
            ...doc.data()
          });
        });

        aplicarFiltros();
      });
    }

    function mostrarDatos(lista) {
      const tabla = document.getElementById("tabla");
      tabla.innerHTML = "";

      lista.forEach(item => {

        const tipoClase = item.tipo === "afiliado" ? "tipo-afiliado" : "tipo-certificado";

        const detalle = item.tipo === "certificado"
          ? (item.evento || "Evento no definido")
          : "Miembro";

        tabla.innerHTML += `
          <tr>
            <td>${item.codigo}</td>
            <td>${item.nombre}</td>
            <td>${item.cedula || "-"}</td>

            <td class="${tipoClase}">
              ${item.tipo}
            </td>

            <td>${detalle}</td>

            <td>${item.estado}</td>

            <td>
              <button class="eliminar" onclick="eliminar('${item.codigo}')">
                Eliminar
              </button>
            </td>
          </tr>
        `;
      });
    }

    function eliminar(codigo) {
      if (confirm("¿Eliminar este documento?")) {
        db.collection("documentos").doc(codigo).delete().then(() => {
          cargarDatos();
        });
      }
    }

    function aplicarFiltros() {
      const texto = document.getElementById("buscador").value.toLowerCase();
      const tipo = document.getElementById("filtroTipo").value;

      let filtrados = datos.filter(d =>
        d.nombre?.toLowerCase().includes(texto) ||
        d.codigo.toLowerCase().includes(texto)
      );

      if (tipo !== "todos") {
        filtrados = filtrados.filter(d => d.tipo === tipo);
      }

      mostrarDatos(filtrados);
    }

    document.getElementById("buscador")
      .addEventListener("input", aplicarFiltros);

    document.getElementById("filtroTipo")
      .addEventListener("change", aplicarFiltros);

    function irAGenerar() {
      window.location.href = "generar.html";
    }

    cargarDatos();

  </script>

</body>
</html>
