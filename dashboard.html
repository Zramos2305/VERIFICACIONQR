<!DOCTYPE html>
<html>
<head>
  <title>Panel de Control</title>
  <h3 id="usuarioActivo" style="text-align:right; color:#1e3a5f;"></h3>

  <style>
    body {
      font-family: Arial;
      background: #eef2f7;
      margin: 0;
    }

    .container {
      max-width: 1150px;
      margin: 40px auto;
      background: white;
      border-radius: 12px;
      padding: 25px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      color: #1e3a5f;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 15px;
    }

    .grupo-botones {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .crear { background:#1e3a5f; color:white; }
    .excel { background:#16a34a; color:white; }
    .cert { background:#2563eb; color:white; }
    .afil { background:#7c3aed; color:white; }
    .salir { background:#05754a; color:white; }

    .top-controls {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    input, select {
      flex: 1;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    table {
      width: 100%;
      margin-top: 20px;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
      text-align: center;
    }

    th {
      background: #1e3a5f;
      color: white;
    }

    .tipo-certificado { color:#16a34a; font-weight:bold; }
    .tipo-afiliado { color:#2563eb; font-weight:bold; }

    .eliminar { background:#dc2626; color:white; }
    .qr-btn { background:#0ea5e9; color:white; }

  </style>
</head>

<body>

<div class="container">

  <h2>Panel de Documentos</h2>

  <div class="header-top">

    <div class="grupo-botones">
      <button class="excel" onclick="descargarExcel()">📊 Todos</button>
      <button class="cert" onclick="descargarPorTipo('certificado')">🎓 Certificados</button>
      <button class="afil" onclick="descargarPorTipo('afiliado')">👤 Afiliados</button>
      <button class="salir" onclick="logout()">🚪 Salir</button>
    </div>

    <button class="crear" onclick="irAGenerar()">➕ Agregar</button>

  </div>

  <div class="top-controls">
    <input id="buscador" placeholder="Buscar...">
    <select id="filtroTipo">
      <option value="todos">Todos</option>
      <option value="certificado">Certificados</option>
      <option value="afiliado">Afiliados</option>
    </select>
  </div>

  <table>
    <thead>
      <tr>
        <th>Código</th>
        <th>Nombre</th>
        <th>Cédula</th>
        <th>Tipo</th>
        <th>Detalle</th>
        <th>Estado</th>
        <th>Fecha</th>
        <th>QR</th>
        <th>Acción</th>
      </tr>
    </thead>
    <tbody id="tabla"></tbody>
  </table>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>

const firebaseConfig = {
   apiKey: "AIzaSyAxcjIRGV1eg59e8fJXZZaZzLcdXfa3lQI",
      authDomain: "fundacion-isla-cascajal.firebaseapp.com",
      projectId: "fundacion-isla-cascajal",
    
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let datos = [];

function formatearFecha(f) {
  if (!f) return "-";
  return new Date(f).toLocaleString();
}

function cargarDatos() {
  db.collection("documentos").get().then(snap => {
    datos = [];
    snap.forEach(doc => {
      datos.push({ codigo: doc.id, ...doc.data() });
    });
    aplicarFiltros();
  });
}

function mostrarDatos(lista) {
  const tabla = document.getElementById("tabla");
  tabla.innerHTML = "";

  lista.forEach(item => {

    const link = "https://zramos2305.github.io/VERIFICACIONQR/?doc=" + item.codigo;

    tabla.innerHTML += `
      <tr>
        <td>${item.codigo}</td>
        <td>${item.nombre}</td>
        <td>${item.cedula || "-"}</td>
        <td class="${item.tipo === "afiliado" ? "tipo-afiliado" : "tipo-certificado"}">${item.tipo}</td>
        <td>${item.tipo === "certificado" ? item.evento : "Miembro"}</td>
        <td>${item.estado}</td>
        <td>${formatearFecha(item.fecha)}</td>

        <td>
          <button class="qr-btn" onclick="descargarQR('${link}', '${item.codigo}')">
            QR
          </button>
        </td>

        <td>
          <button class="eliminar" onclick="eliminar('${item.codigo}')">
            Eliminar
          </button>
        </td>
      </tr>
    `;
  });
}

<!-- 🔥 AQUÍ ESTÁ LA SOLUCIÓN REAL -->
function descargarQR(link, codigo) {

  const urlQR = "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=" + encodeURIComponent(link);

  fetch(urlQR)
    .then(res => res.blob())
    .then(blob => {

      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");

      a.href = url;
      a.download = "QR_" + codigo + ".png";
      document.body.appendChild(a);
      a.click();

      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    })
    .catch(() => {
      alert("Error al descargar QR");
    });
}

function eliminar(codigo) {
  if (confirm("¿Eliminar?")) {
    db.collection("documentos").doc(codigo).delete().then(cargarDatos);
  }
}

function aplicarFiltros() {
  const texto = buscador.value.toLowerCase();
  const tipo = filtroTipo.value;

  let filtrados = datos.filter(d =>
    d.nombre?.toLowerCase().includes(texto) ||
    d.codigo.toLowerCase().includes(texto)
  );

  if (tipo !== "todos") {
    filtrados = filtrados.filter(d => d.tipo === tipo);
  }

  mostrarDatos(filtrados);
}

buscador.addEventListener("input", aplicarFiltros);
filtroTipo.addEventListener("change", aplicarFiltros);

function descargarExcel() {
  exportar(datos, "todos");
}

function descargarPorTipo(tipo) {
  const filtrados = datos.filter(d => d.tipo === tipo);
  exportar(filtrados, tipo);
}

function exportar(lista, nombre) {

  if (lista.length === 0) {
    alert("No hay datos");
    return;
  }

  let filas = [];

  // Encabezados
  filas.push([
    "Código",
    "Nombre",
    "Cédula",
    "Tipo",
    "Detalle",
    "Estado",
    "Fecha"
  ]);

  // Datos
  lista.forEach(item => {

    const detalle = item.tipo === "certificado"
      ? (item.evento || "Evento")
      : "Miembro";

    filas.push([
      item.codigo,
      item.nombre,
      item.cedula || "",
      item.tipo,
      detalle,
      item.estado,
      formatearFecha(item.fecha)
    ]);
  });

  // Convertir a CSV con comillas (🔥 clave para Excel)
  let csv = filas.map(fila =>
    fila.map(valor => `"${valor}"`).join(",")
  ).join("\n");

  const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });

  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = nombre + ".csv";
  link.click();
}

function logout() {
  firebase.auth().signOut().then(() => location.href="login.html");
}

function irAGenerar() {
  location.href = "generar.html";
}

firebase.auth().onAuthStateChanged(user => {

  if (user) {

    const nombre = user.displayName || user.email;

    document.getElementById("usuarioActivo").innerText =
      "👤 " + nombre;

    setTimeout(() => {
      cargarDatos();
    }, 500);

  } else {
    location.href = "login.html";
  }

});
</script>

</body>
</html>
