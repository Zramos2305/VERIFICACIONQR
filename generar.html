<!DOCTYPE html>
<html>
<head>
  <title>Generar Documento</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Arial;
      background: #eef2f7;
    }

    .container {
      max-width: 500px;
      margin: 60px auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.1);
      overflow: hidden;
      text-align: center;
    }

    .header {
      background: #1e3a5f;
      color: white;
      padding: 20px;
    }

    .header img {
      width: 100px;
      margin-bottom: 5px;
    }

    .form {
      padding: 25px;
    }

    input, select {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      background: #1e3a5f;
      color: white;
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #162c47;
    }

    #qr {
      margin: 20px auto;
    }

    .footer {
      background: #f1f1f1;
      padding: 10px;
      font-size: 12px;
      color: #555;
    }

    .descargar {
      display: inline-block;
      margin-top: 10px;
      background: #16a34a;
    }

    .descargar:hover {
      background: #15803d;
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="header">
      <img src="logo.png">
      <h2 style="margin: 10px 0 5px;">Generar Documento</h2>
      <h2 style="margin: 0;">Fundación Isla Cascajal</h2>
      <p style="margin-top:8px;">Sistema institucional</p>
    </div>

    <div class="form">

      <input id="nombre" placeholder="Nombre completo">
      <input id="cedula" placeholder="Cédula">

      <select id="tipo">
        <option value="">Seleccione tipo</option>
        <option value="certificado">Certificado</option>
        <option value="afiliado">Afiliado</option>
      </select>

      <!-- 🔥 EVENTO OCULTO INICIALMENTE -->
      <input id="evento" placeholder="Nombre del evento" style="display:none;">

      <button onclick="previsualizar()">👁 Previsualizar</button>
      <button onclick="crearDocumento()">Generar Documento</button>

      <div id="resultado"></div>

    </div>

    <div class="footer">
      Generador oficial de documentos
    </div>

  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <!-- QR -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <script>

    const firebaseConfig = {
      apiKey: "AIzaSyAxcjIRGV1eg59e8fJXZZaZzLcdXfa3lQI",
      authDomain: "fundacion-isla-cascajal.firebaseapp.com",
      projectId: "fundacion-isla-cascajal",
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function generarCodigo() {
      const caracteres = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
      let codigo = "DOC-";
      for (let i = 0; i < 8; i++) {
        codigo += caracteres.charAt(Math.floor(Math.random() * caracteres.length));
      }
      return codigo;
    }

    // 👁 PREVISUALIZACIÓN
    function previsualizar() {
      const nombre = document.getElementById("nombre").value;
      const cedula = document.getElementById("cedula").value;
      const tipo = document.getElementById("tipo").value;
      const evento = document.getElementById("evento").value;

      document.getElementById("resultado").innerHTML = `
        <div style="background:#f1f5f9; padding:15px; border-radius:10px;">
          <h3>Vista previa</h3>
          <p><strong>Nombre:</strong> ${nombre}</p>
          <p><strong>Cédula:</strong> ${cedula}</p>
          <p><strong>Tipo:</strong> ${tipo}</p>
          ${tipo === "certificado" ? `<p><strong>Evento:</strong> ${evento}</p>` : ""}
        </div>
      `;
    }

    async function crearDocumento() {

      const nombre = document.getElementById("nombre").value.trim();
      const cedula = document.getElementById("cedula").value.trim();
      const tipo = document.getElementById("tipo").value;
      const evento = document.getElementById("evento").value;

      if (!nombre || !cedula || !tipo) {
        alert("⚠️ Completa todos los campos");
        return;
      }

      // 🔥 VALIDAR EVENTO SI ES CERTIFICADO
      if (tipo === "certificado" && !evento) {
        alert("⚠️ Debes ingresar el nombre del evento");
        return;
      }

      // 🔐 VALIDAR DUPLICADO SOLO AFILIADOS
      if (tipo === "afiliado") {
        const query = await db.collection("documentos")
          .where("cedula", "==", cedula)
          .where("tipo", "==", "afiliado")
          .get();

        if (!query.empty) {
          alert("⚠️ Esta persona ya está afiliada");
          return;
        }
      }

      const codigo = generarCodigo();

      await db.collection("documentos").doc(codigo).set({
        nombre: nombre,
        cedula: cedula,
        tipo: tipo,
        evento: tipo === "certificado" ? evento : null,
        estado: "válido",
        fecha: new Date().toISOString()
      });

      const link = "https://zramos2305.github.io/VERIFICACIONQR/?doc=" + codigo;

      document.getElementById("resultado").innerHTML = `
        <h3 style="color:#16a34a;">✅ Documento creado</h3>

        <p><strong>${codigo}</strong></p>

        <div id="qr"></div>

        <a href="${link}" target="_blank">🔍 Verificar documento</a><br>

        <button class="descargar" onclick="descargarQR()">⬇ Descargar QR</button>
      `;

      new QRCode(document.getElementById("qr"), {
        text: link,
        width: 180,
        height: 180
      });

    }

    function descargarQR() {
      const qrCanvas = document.querySelector("#qr canvas");

      if (!qrCanvas) {
        alert("QR aún no generado");
        return;
      }

      const enlace = document.createElement("a");
      enlace.href = qrCanvas.toDataURL("image/png");
      enlace.download = "qr-documento.png";
      enlace.click();
    }

    // 🔥 CONTROL DINÁMICO DEL CAMPO EVENTO
    const tipoSelect = document.getElementById("tipo");
    const campoEvento = document.getElementById("evento");

    tipoSelect.addEventListener("change", function() {

      if (this.value === "certificado") {
        campoEvento.style.display = "block";
      } else {
        campoEvento.style.display = "none";
        campoEvento.value = "";
      }

    });

  </script>

</body>
</html>
