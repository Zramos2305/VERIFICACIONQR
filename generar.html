<!DOCTYPE html>
<html>
<head>
  <title>Generar Documento</title>
</head>

<body style="font-family: Arial; text-align:center; padding:40px;">

  <h2>Crear Documento</h2>

  <input id="nombre" placeholder="Nombre"><br><br>
  <input id="tipo" placeholder="Tipo de documento"><br><br>

  <button onclick="crearDocumento()">Generar</button>

  <div id="resultado"></div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <!-- LIBRERIA QR -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAxcjIRGV1eg59e8fJXZZaZzLcdXfa3lQI",
      authDomain: "fundacion-isla-cascajal.firebaseapp.com",
      projectId: "fundacion-isla-cascajal",
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function generarCodigo() {
      const caracteres = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
      let codigo = "DOC-";
      for (let i = 0; i < 8; i++) {
        codigo += caracteres.charAt(Math.floor(Math.random() * caracteres.length));
      }
      return codigo;
    }

    function crearDocumento() {
      const nombre = document.getElementById("nombre").value;
      const tipo = document.getElementById("tipo").value;
      const codigo = generarCodigo();

      db.collection("documentos").doc(codigo).set({
        nombre: nombre,
        tipo_documento: tipo,
        estado: "válido"
      }).then(() => {
  const link = "https://zramos2305.github.io/VERIFICACIONQR/?doc=" + codigo;

  document.getElementById("resultado").innerHTML = `
    <div style="margin-top:20px;">
      <h3 style="color:#16a34a;">✅ Documento creado</h3>

      <p><strong>Código:</strong> ${codigo}</p>

      <div id="qr" style="margin:20px auto;"></div>

      <a href="${link}" target="_blank">🔍 Verificar documento</a>
    </div>
  `;

  // GENERAR QR
  new QRCode(document.getElementById("qr"), {
    text: link,
    width: 150,
    height: 150
  });

})
    }
  </script>

</body>
</html>
