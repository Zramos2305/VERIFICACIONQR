<!DOCTYPE html>
<html>
<head>
  <title>Generar Documento</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Arial;
      background: #eef2f7;
    }

    .container {
      max-width: 500px;
      margin: 60px auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.1);
      overflow: hidden;
      text-align: center;
    }

    .header {
      background: #1e3a5f;
      color: white;
      padding: 20px;
    }

    .header img {
      width: 70px;
      margin-bottom: 10px;
    }

    .form {
      padding: 25px;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      background: #1e3a5f;
      color: white;
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #162c47;
    }

    #qr {
      margin: 20px auto;
    }

    .footer {
      background: #f1f1f1;
      padding: 10px;
      font-size: 12px;
      color: #555;
    }

    .descargar {
      display: inline-block;
      margin-top: 10px;
      background: #16a34a;
    }

    .descargar:hover {
      background: #15803d;
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- HEADER -->
    <div class="header">
      <img src="logo.png">
      <h2>Generar Documento</h2>
      <h2>Fundacion isla cascajal</h2>
      <p>Sistema institucional</p>
    </div>

    <!-- FORM -->
    <div class="form">

      <input id="nombre" placeholder="Nombre completo">
      <input id="tipo" placeholder="Tipo de documento">

      <button onclick="crearDocumento()">Generar Documento</button>

      <div id="resultado"></div>

    </div>

    <!-- FOOTER -->
    <div class="footer">
      Generador oficial de documentos
    </div>

  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <!-- QR -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <script>

    const firebaseConfig = {
      apiKey: "AIzaSyAxcjIRGV1eg59e8fJXZZaZzLcdXfa3lQI",
      authDomain: "fundacion-isla-cascajal.firebaseapp.com",
      projectId: "fundacion-isla-cascajal",
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function generarCodigo() {
      const caracteres = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
      let codigo = "DOC-";
      for (let i = 0; i < 8; i++) {
        codigo += caracteres.charAt(Math.floor(Math.random() * caracteres.length));
      }
      return codigo;
    }

    function crearDocumento() {

      const nombre = document.getElementById("nombre").value;
      const tipo = document.getElementById("tipo").value;
      const codigo = generarCodigo();

      db.collection("documentos").doc(codigo).set({
        nombre: nombre,
        tipo_documento: tipo,
        estado: "válido"
      })
      .then(() => {

        const link = "https://zramos2305.github.io/VERIFICACIONQR/?doc=" + codigo;

        document.getElementById("resultado").innerHTML = `
          <h3 style="color:#16a34a;">✅ Documento creado</h3>

          <p><strong>${codigo}</strong></p>

          <div id="qr"></div>

          <a href="${link}" target="_blank">🔍 Verificar documento</a><br>

          <button class="descargar" onclick="descargarQR()">⬇ Descargar QR</button>
        `;

        // Generar QR
        new QRCode(document.getElementById("qr"), {
          text: link,
          width: 180,
          height: 180
        });

      });

    }

    function descargarQR() {
      const qrCanvas = document.querySelector("#qr canvas");

      if (!qrCanvas) {
        alert("QR aún no generado");
        return;
      }

      const enlace = document.createElement("a");
      enlace.href = qrCanvas.toDataURL("image/png");
      enlace.download = "qr-documento.png";
      enlace.click();
    }

  </script>

</body>
</html>
